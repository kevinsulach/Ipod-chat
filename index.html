<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Private Chat</title>
    <style>
        /* PASTE YOUR BACKGROUND AND BUBBLE CSS HERE */
        body { 
            font-family: -apple-system, Helvetica, sans-serif; 
            margin: 0; 
            background: url('bg.jpg') no-repeat center center fixed; 
            background-size: cover; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #header { background: rgba(255,255,255,0.9); padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #ccc; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.2); }
        .msg { max-width: 70%; padding: 8px 12px; margin-bottom: 8px; border-radius: 18px; font-size: 15px; position: relative; }
        .msg.me { align-self: flex-end; background: #007aff; color: white; }
        .msg.them { align-self: flex-start; background: #e5e5ea; color: black; }
        #input-area { background: #fff; padding: 10px; display: flex; border-top: 1px solid #ccc; }
        input { flex: 1; border: 1px solid #ccc; padding: 10px; border-radius: 20px; font-size: 16px; }
        button { background: #007aff; color: white; border: none; padding: 10px 15px; border-radius: 20px; margin-left: 5px; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <h2 style="color:white">Private Chat</h2>
        <input type="password" id="pass-input" placeholder="Enter Password" style="flex:none; width:200px; margin-bottom:10px;">
        <button onclick="checkLogin()">Unlock</button>
    </div>

    <div id="header">Secure Messenger</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="file" id="photo-input" accept="image/*" style="display:none" onchange="uploadPhoto()">
        <button onclick="document.getElementById('photo-input').click()" style="background:#555">📷</button>
        <input id="text" placeholder="iMessage" onkeypress="if(event.keyCode==13)send()">
        <button onclick="send()">Send</button>
    </div>

    </script>
</body>
</html>
