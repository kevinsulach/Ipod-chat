<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Chat</title>
    <style>
        body { font-family: -apple-system, Helvetica, sans-serif; margin: 0; background: #f2f2f7; display: flex; flex-direction: column; height: 100vh; }
        #header { background: #fff; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #ccc; color: #000; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { max-width: 70%; padding: 8px 12px; margin-bottom: 8px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.me { align-self: flex-end; background: #007aff; color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: #e5e5ea; color: black; border-bottom-left-radius: 2px; }
        .time { font-size: 10px; opacity: 0.6; margin-top: 4px; display: block; text-align: right; }
        #input-area { background: #fff; padding: 10px; display: flex; border-top: 1px solid #ccc; }
        input { flex: 1; border: 1px solid #ccc; padding: 10px; border-radius: 20px; outline: none; font-size: 16px; }
        button { background: #007aff; color: white; border: none; padding: 0 15px; margin-left: 8px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="header">iPod Messenger</div>
    <div id="messages"></div>
    <div id="input-area">
        <input id="text" placeholder="iMessage" onkeypress="if(event.keyCode==13)send()">
        <button onclick="send()">Send</button>
    </div>

    <script>
        // Use YOUR URL here
        const server = "https://dumbo-chat.onrender.com"; 
        let myName = prompt("Enter your name:") || "Guest";

        function fetchMessages() {
            fetch(server + "/messages")
                .then(res => res.json())
                .then(data => {
                    const box = document.getElementById("messages");
                    box.innerHTML = "";
                    data.forEach(m => {
                        const side = m.user === myName ? "me" : "them";
                        box.innerHTML += `<div class="msg ${side}"><b>${m.user}:</b><br>${m.text}<span class="time">${m.time}</span></div>`;
                    });
                    box.scrollTop = box.scrollHeight;
                });
        }

        function send() {
            const input = document.getElementById("text");
            if (!input.value) return;
            fetch(server + "/send", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user: myName, text: input.value })
            }).then(() => {
                input.value = "";
                fetchMessages();
            });
        }

        setInterval(fetchMessages, 3000);
        fetchMessages();
    </script>
</body>
</html>
