<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iPod Chat</title>
<style>
  body { font-family: Arial; margin:0; background:#111; color:white; }
  #messages { height:80vh; overflow-y:scroll; padding:10px; border-bottom:1px solid #555; }
  .message { margin-bottom:10px; }
  input { width:70%; padding:10px; border-radius:5px; border:none; }
  button { padding:10px 15px; margin-left:5px; border:none; border-radius:5px; background:#0af; color:white; }
</style>
</head>
<body>

<div id="messages"></div>

<input id="text" placeholder="Type message here">
<button onclick="sendMessage()">Send</button>

<script>
  // REPLACE THIS WITH YOUR COMPUTER'S IP
  const server = "http://10.0.0.220:3000";

  // Fetch messages from server
  function fetchMessages() {
    fetch(server + "/messages")
      .then(res => res.json())
      .then(data => {
        const box = document.getElementById("messages");
        box.innerHTML = "";
        data.forEach(m => {
          box.innerHTML += "<div class='message'><b>" + m.user + ":</b> " + m.text + "</div>";
        });
        box.scrollTop = box.scrollHeight;
      })
      .catch(err => console.log(err));
  }

  // Send message to server
  function sendMessage() {
    const text = document.getElementById("text").value;
    if (!text) return;
    fetch(server + "/send", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user: "Kevin", text: text })
    })
    .then(() => {
      document.getElementById("text").value = "";
      fetchMessages();
    })
    .catch(err => console.log(err));
  }

  // Auto-refresh every 3 seconds
  setInterval(fetchMessages, 3000);
  fetchMessages();
</script>

</body>
</html>
